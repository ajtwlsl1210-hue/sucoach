<!DOCTYPE html>
<html lang="ko" class="theme-light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>毛聜麓 矛聢聵铆聳聣铆聫聣锚掳聙 芒聙聰 矛聢聵矛陆聰矛鹿聵</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html.theme-dark {
      --bg:#0A0A0A; --surface:#141414; --surface-hover:#1C1C1C; --surface-2:#1C1C1C;
      --border:rgba(255,255,255,0.08); --text:#EDEDED; --text-secondary:#888; --text-muted:#555;
      --accent:#6366F1; --accent-hover:#818CF8; --accent-light:rgba(99,102,241,0.12);
      --positive:#10b981; --negative:#f43f5e; --warning:#f59e0b; --input-bg:#1C1C1C;
    }
    html.theme-light {
      --bg:#F8FAFC; --surface:#FFFFFF; --surface-hover:#F1F5F9; --surface-2:#F8FAFC;
      --border:rgba(0,0,0,0.08); --text:#0F172A; --text-secondary:#64748B; --text-muted:#94A3B8;
      --accent:#4F46E5; --accent-hover:#4338CA; --accent-light:rgba(79,70,229,0.08);
      --positive:#059669; --negative:#DC2626; --warning:#D97706; --input-bg:#F8FAFC;
    }
    body {
      font-family:'Noto Sans KR',sans-serif; background:var(--bg); color:var(--text);
      min-height:100vh; -webkit-font-smoothing:antialiased; transition:background 0.3s,color 0.3s;
    }

    /* 芒聰聙芒聰聙 铆聝聭毛掳聰 芒聰聙芒聰聙 */
    .topbar {
      position:sticky; top:0; z-index:100; background:var(--surface);
      border-bottom:1px solid var(--border); padding:0 20px; height:56px;
      display:flex; align-items:center; gap:12px;
    }
    .topbar-logo { font-size:20px; font-weight:900; color:var(--accent); letter-spacing:-0.06em; }
    .topbar-divider { width:1px; height:20px; background:var(--border); }
    .topbar-title { font-size:14px; font-weight:700; color:var(--text-secondary); flex:1; }
    .topbar-actions { display:flex; gap:8px; align-items:center; }
    .btn-sm {
      padding:8px 14px; border-radius:8px; font-size:13px; font-weight:600;
      cursor:pointer; font-family:inherit; border:1px solid var(--border);
      background:var(--surface-hover); color:var(--text); transition:all 0.2s;
      display:inline-flex; align-items:center; gap:5px;
    }
    .btn-sm:hover { background:var(--accent); color:white; border-color:var(--accent); }
    .theme-btn {
      width:32px; height:32px; border-radius:8px; border:1px solid var(--border);
      background:none; color:var(--text-secondary); cursor:pointer; display:flex;
      align-items:center; justify-content:center; font-size:14px; transition:background 0.2s;
    }
    .theme-btn:hover { background:var(--surface-hover); }

    /* 芒聰聙芒聰聙 毛漏聰矛聺赂 芒聰聙芒聰聙 */
    .main { max-width:860px; margin:0 auto; padding:28px 20px 80px; }

    /* 芒聰聙芒聰聙 铆聶聵矛聵聛 铆聴陇毛聧聰 芒聰聙芒聰聙 */
    .welcome-header {
      background:linear-gradient(135deg, var(--accent) 0%, #7C3AED 100%);
      border-radius:20px; padding:28px 28px; margin-bottom:24px; color:white;
    }
    .welcome-greeting { font-size:13px; opacity:0.8; margin-bottom:6px; }
    .welcome-name { font-size:1.8rem; font-weight:900; letter-spacing:-0.05em; margin-bottom:4px; }
    .welcome-sub { font-size:13px; opacity:0.75; }
    .welcome-stats { display:flex; gap:20px; margin-top:20px; }
    .welcome-stat { display:flex; flex-direction:column; gap:3px; }
    .welcome-stat-val { font-size:22px; font-weight:900; }
    .welcome-stat-lbl { font-size:11px; opacity:0.7; }

    /* 芒聰聙芒聰聙 矛聞鹿矛聟聵 芒聰聙芒聰聙 */
    .section { margin-bottom:24px; }
    .section-header {
      display:flex; align-items:center; justify-content:space-between; margin-bottom:14px;
    }
    .section-title {
      font-size:15px; font-weight:800; letter-spacing:-0.03em;
      display:flex; align-items:center; gap:7px;
    }
    .section-count {
      background:var(--accent-light); color:var(--accent); border-radius:6px;
      padding:2px 8px; font-size:11px; font-weight:700;
    }

    /* 芒聰聙芒聰聙 矛聢聵铆聳聣铆聫聣锚掳聙 矛鹿麓毛聯聹 芒聰聙芒聰聙 */
    .asgn-list { display:flex; flex-direction:column; gap:12px; }
    .asgn-card {
      background:var(--surface); border:1px solid var(--border); border-radius:16px;
      padding:18px 20px; cursor:pointer; transition:all 0.2s;
      display:flex; flex-direction:column; gap:12px;
    }
    .asgn-card:hover { border-color:var(--accent); transform:translateY(-1px); box-shadow:0 4px 16px rgba(0,0,0,0.07); }
    .asgn-card-top { display:flex; align-items:flex-start; gap:12px; }
    .asgn-card-icon { font-size:24px; flex-shrink:0; margin-top:2px; }
    .asgn-card-info { flex:1; min-width:0; }
    .asgn-card-subject {
      display:inline-block; padding:2px 8px; border-radius:5px; font-size:11px; font-weight:700;
      background:var(--accent-light); color:var(--accent); margin-bottom:5px;
    }
    .asgn-card-title { font-size:15px; font-weight:800; letter-spacing:-0.03em; }
    .asgn-card-meta { font-size:12px; color:var(--text-muted); margin-top:3px; }
    .asgn-card-right { display:flex; flex-direction:column; align-items:flex-end; gap:6px; flex-shrink:0; }
    .asgn-stage-badge {
      padding:4px 10px; border-radius:7px; font-size:12px; font-weight:700;
      border:1.5px solid currentColor;
    }
    .dday-badge {
      padding:3px 8px; border-radius:6px; font-size:11px; font-weight:700;
    }
    .dday-urgent { background:rgba(220,38,38,0.1); color:var(--negative); }
    .dday-warning { background:rgba(217,119,6,0.1); color:var(--warning); }
    .dday-safe { background:rgba(5,150,105,0.1); color:var(--positive); }
    .dday-overdue { background:rgba(220,38,38,0.15); color:var(--negative); }
    .dday-none { background:var(--surface-2); color:var(--text-muted); }

    /* 矛搂聞铆聳聣毛掳聰 */
    .asgn-progress { display:flex; align-items:center; gap:10px; }
    .progress-bar-wrap { flex:1; height:5px; background:var(--border); border-radius:3px; overflow:hidden; }
    .progress-bar { height:100%; background:var(--accent); border-radius:3px; transition:width 0.5s ease; }
    .progress-label { font-size:11px; color:var(--text-muted); font-weight:600; flex-shrink:0; }

    /* 芒聰聙芒聰聙 矛聶聞毛拢聦 矛聲聞矛陆聰毛聰聰矛聳赂 芒聰聙芒聰聙 */
    .completed-toggle {
      display:flex; align-items:center; gap:8px; padding:12px 16px;
      background:var(--surface); border:1px solid var(--border); border-radius:12px;
      cursor:pointer; font-size:13px; font-weight:700; color:var(--text-secondary);
      transition:all 0.2s; margin-bottom:12px;
    }
    .completed-toggle:hover { background:var(--surface-hover); }
    .completed-toggle .toggle-arrow { transition:transform 0.2s; }
    .completed-toggle.open .toggle-arrow { transform:rotate(90deg); }

    /* 芒聰聙芒聰聙 铆聦聦矛聺录 矛聴聟毛隆聹毛聯聹 矛聞鹿矛聟聵 芒聰聙芒聰聙 */
    .upload-section {
      background:var(--surface); border:1px solid var(--border); border-radius:16px; overflow:hidden;
    }
    .upload-section-header {
      padding:16px 20px; border-bottom:1px solid var(--border);
      display:flex; align-items:center; justify-content:space-between;
    }
    .upload-area {
      padding:20px; border:2px dashed var(--border); border-radius:12px; margin:16px 20px 20px;
      text-align:center; cursor:pointer; transition:all 0.2s;
    }
    .upload-area:hover { border-color:var(--accent); background:var(--accent-light); }
    .upload-icon { font-size:28px; margin-bottom:8px; }
    .upload-text { font-size:14px; color:var(--text-secondary); font-weight:600; }
    .upload-sub { font-size:12px; color:var(--text-muted); margin-top:4px; }
    #studentFileInput { display:none; }

    .file-list { padding:0; }
    .file-item {
      display:flex; align-items:center; padding:13px 20px; gap:12px;
      border-bottom:1px solid var(--border); transition:background 0.2s;
    }
    .file-item:last-child { border-bottom:none; }
    .file-item:hover { background:var(--surface-hover); }
    .file-icon { font-size:20px; flex-shrink:0; }
    .file-info { flex:1; min-width:0; }
    .file-name { font-size:13px; font-weight:600; white-space:nowraw; overflow:hidden; text-overflow:ellipsis; }
    .file-meta { font-size:11px; color:var(--text-muted); margin-top:2px; }
    .btn-icon {
      width:28px; height:28px; border-radius:6px; border:1px solid var(--border);
      background:none; cursor:pointer; display:flex; align-items:center; justify-content:center;
      font-size:13px; color:var(--text-secondary); transition:all 0.2s; flex-shrink:0;
    }
    .btn-icon:hover { background:var(--accent); color:white; border-color:var(--accent); }

    /* 芒聰聙芒聰聙 矛聲聦毛娄录 毛掳掳毛聞聢 芒聰聙芒聰聙 */
    .notice-banner {
      padding:14px 16px; border-radius:12px; margin-bottom:16px;
      display:flex; align-items:flex-start; gap:10px; font-size:13px;
    }
    .notice-banner.info { background:rgba(37,99,235,0.08); border:1px solid rgba(37,99,235,0.15); color:#1d4ed8; }
    .notice-banner.warn { background:rgba(217,119,6,0.08); border:1px solid rgba(217,119,6,0.15); color:var(--warning); }
    .notice-icon { font-size:16px; flex-shrink:0; margin-top:1px; }
    .notice-text { line-height:1.5; }

    /* 芒聰聙芒聰聙 毛陋篓毛聥卢 芒聰聙芒聰聙 */
    .modal-overlay {
      position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:200;
      display:none; align-items:center; justify-content:center; padding:24px;
    }
    .modal-overlay.open { display:flex; }
    .modal {
      background:var(--surface); border:1px solid var(--border);
      border-radius:20px; padding:28px; width:100%; max-width:420px;
      animation:fadeUp 0.3s ease-out both;
    }
    @keyframes fadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
    .modal-title { font-size:1.1rem; font-weight:800; margin-bottom:16px; }
    .form-group { margin-bottom:14px; }
    .form-group label { display:block; font-size:12px; font-weight:600; color:var(--text-secondary); margin-bottom:5px; }
    .form-group input, .form-group select {
      width:100%; padding:10px 12px; border-radius:8px; border:1.5px solid var(--border);
      background:var(--input-bg); color:var(--text); font-size:13px; font-family:inherit; outline:none;
      transition:border-color 0.2s;
    }
    .form-group input:focus, .form-group select:focus { border-color:var(--accent); }
    .modal-actions { display:flex; gap:10px; margin-top:20px; }
    .btn-full { flex:1; padding:11px; border-radius:9px; font-size:13px; font-weight:700; cursor:pointer; font-family:inherit; border:none; }
    .btn-full.primary { background:var(--accent); color:white; }
    .btn-full.cancel { background:var(--surface-hover); color:var(--text); border:1px solid var(--border); }
    .alert { padding:10px 12px; border-radius:8px; font-size:13px; margin-bottom:12px; display:none; }
    .alert.error { background:rgba(220,38,38,0.08); color:var(--negative); border:1px solid rgba(220,38,38,0.2); }
    .alert.show { display:block; }

    /* 芒聰聙芒聰聙 毛鹿聢 矛聝聛铆聝聹 芒聰聙芒聰聙 */
    .opacity-50 { opacity:0.55; }
    .grade-badge { font-size:13px; font-weight:800; }
    .grade-badge.grade-1, .grade-badge.grade-A { color:var(--positive); }
    .grade-badge.grade-2                        { color:#10b981; }
    .grade-badge.grade-3, .grade-badge.grade-B  { color:#3B82F6; }
    .grade-badge.grade-4, .grade-badge.grade-C  { color:var(--warning); }
    .grade-badge.grade-5, .grade-badge.grade-6, .grade-badge.grade-7,
    .grade-badge.grade-8, .grade-badge.grade-9,
    .grade-badge.grade-D, .grade-badge.grade-E  { color:var(--negative); }
    .empty-state { text-align:center; padding:48px 20px; color:var(--text-muted); }
    .empty-icon { font-size:40px; margin-bottom:12px; opacity:0.5; }
    .empty-text { font-size:13px; }

    /* 芒聰聙芒聰聙 毛隆聹毛聰漏 芒聰聙芒聰聙 */
    .loading-wrap { display:flex; align-items:center; justify-content:center; min-height:300px; flex-direction:column; gap:12px; color:var(--text-secondary); }
    .spinner-lg { width:36px; height:36px; border:3px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin 0.8s linear infinite; }
    @keyframes spin { to{transform:rotate(360deg)} }
  </style>
</head>
<body>

<!-- 铆聝聭毛掳聰 -->
<div class="topbar">
  <div class="topbar-logo">矛聢聵矛陆聰矛鹿聵</div>
  <div class="topbar-divider"></div>
  <div class="topbar-title" id="topbarTitle">毛聜麓 矛聢聵铆聳聣铆聫聣锚掳聙</div>
  <div class="topbar-actions">
    <button class="btn-sm" onclick="openModal('uploadFileModal')">冒聼聯聨 矛聻聬毛拢聦 矛聴聟毛隆聹毛聯聹</button>
    <button class="btn-sm" onclick="openModal('pwModal')">冒聼聰聭</button>
    <button class="btn-sm" onclick="DB.logout()">毛隆聹锚路赂矛聲聞矛聸聝</button>
    <button class="theme-btn" id="themeBtn" onclick="cycleTheme()">冒聼聦聶</button>
  </div>
</div>

<!-- 毛漏聰矛聺赂 -->
<div class="main">
  <div class="loading-wrap" id="loadingWrap">
    <div class="spinner-lg"></div>
    <div>毛露聢毛聼卢矛聵陇毛聤聰 矛陇聭芒聙娄</div>
  </div>
  <div id="pageContent" style="display:none"></div>
</div>

<!-- 铆聦聦矛聺录 矛聴聟毛隆聹毛聯聹 毛陋篓毛聥卢 -->
<div class="modal-overlay" id="uploadFileModal">
  <div class="modal">
    <div class="modal-title">冒聼聯聨 矛聻聬毛拢聦 矛聴聟毛隆聹毛聯聹</div>
    <div class="alert error" id="uploadAlert"></div>
    <div class="form-group">
      <label>锚麓聙毛聽篓 矛聢聵铆聳聣铆聫聣锚掳聙 (矛聞聽铆聝聺)</label>
      <select id="upload_assignment_id">
        <option value="">矛聺录毛掳聵 矛聻聬毛拢聦 (铆聤鹿矛聽聲 矛聢聵铆聳聣铆聫聣锚掳聙 矛聴聠矛聺聦)</option>
      </select>
    </div>
    <div class="form-group">
      <label>铆聦聦矛聺录 矛垄聟毛楼聵</label>
      <select id="upload_file_type">
        <option value="矛麓聢矛聲聢">矛麓聢矛聲聢</option>
        <option value="矛聢聵矛聽聲毛鲁赂">矛聢聵矛聽聲毛鲁赂</option>
        <option value="矛碌聹矛垄聟毛鲁赂">矛碌聹矛垄聟毛鲁赂</option>
        <option value="矛掳赂锚鲁聽矛聻聬毛拢聦">矛掳赂锚鲁聽矛聻聬毛拢聦</option>
        <option value="锚赂掳铆聝聙">锚赂掳铆聝聙</option>
      </select>
    </div>
    <div class="form-group">
      <label>铆聦聦矛聺录 <span style="font-size:11px;color:var(--text-muted);font-weight:400">(PDF脗路Word脗路铆聲聹锚赂聙脗路JPG脗路PNG 毛聯卤, 矛碌聹毛聦聙 10MB)</span></label>
      <div style="padding:12px;background:var(--surface-2);border-radius:8px;font-size:13px;color:var(--text-muted);cursor:pointer" onclick="document.getElementById('studentFileInput').click()">
        <span id="uploadFileName">铆聦聦矛聺录矛聺聞 矛聞聽铆聝聺铆聲聵矛聞赂矛職聰 (矛碌聹毛聦聙 10MB)</span>
      </div>
      <!-- accept毛聤聰 铆聻聦铆聤赂矛聺录 毛驴聬 芒聙聰 HWP脗路毛陋篓毛聯聽 铆聵聲矛聥聺 铆聴聢矛職漏矛聺聞 矛聹聞铆聲麓 锚麓聭毛虏聰矛聹聞铆聲聵锚虏聦 矛聞陇矛聽聲 -->
      <input type="file" id="studentFileInput"
        accept=".pdf,.doc,.docx,.hwp,.hwpx,.xls,.xlsx,.ppt,.pptx,.jpg,.jpeg,.png,.gif,.bmp,.webp,.txt,.zip,.mp4,.mov"
        onchange="onStudentFileSelected(event)">
    </div>
    <div class="modal-actions">
      <button class="btn-full cancel" onclick="closeModal('uploadFileModal')">矛路篓矛聠聦</button>
      <button class="btn-full primary" id="uploadSubmitBtn" onclick="submitStudentUpload()">矛聴聟毛隆聹毛聯聹</button>
    </div>
  </div>
</div>

<!-- 毛鹿聞毛掳聙毛虏聢铆聵赂 毛鲁聙锚虏陆 毛陋篓毛聥卢 -->
<div class="modal-overlay" id="pwModal">
  <div class="modal">
    <div class="modal-title">冒聼聰聭 毛鹿聞毛掳聙毛虏聢铆聵赂 毛鲁聙锚虏陆</div>
    <div class="alert error" id="pwAlert"></div>
    <div class="form-group">
      <label>铆聵聞矛聻卢 毛鹿聞毛掳聙毛虏聢铆聵赂</label>
      <input type="password" id="inp_pw_current" placeholder="铆聵聞矛聻卢 毛鹿聞毛掳聙毛虏聢铆聵赂">
    </div>
    <div class="form-group">
      <label>矛聝聢 毛鹿聞毛掳聙毛虏聢铆聵赂</label>
      <input type="password" id="inp_pw_new" placeholder="矛聝聢 毛鹿聞毛掳聙毛虏聢铆聵赂 (6矛聻聬 矛聺麓矛聝聛)">
    </div>
    <div class="form-group">
      <label>矛聝聢 毛鹿聞毛掳聙毛虏聢铆聵赂 铆聶聲矛聺赂</label>
      <input type="password" id="inp_pw_confirm" placeholder="矛聻卢矛聻聟毛聽楼">
    </div>
    <div class="modal-actions">
      <button class="btn-full cancel" onclick="closeModal('pwModal')">矛路篓矛聠聦</button>
      <button class="btn-full primary" onclick="submitPwChange()">毛鲁聙锚虏陆</button>
    </div>
  </div>
</div>

<script src="db.js"></script>
<script>
// 芒聰聙芒聰聙 铆聟聦毛搂聢 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙
var savedTheme = localStorage.getItem('sc-theme');
var currentTheme = savedTheme || (window.matchMedia('(prefers-color-scheme:dark)').matches ? 'dark' : 'light');
function applyTheme(t) {
  document.documentElement.className = 'theme-' + t;
  var btn = document.getElementById('themeBtn');
  if (btn) btn.textContent = t === 'dark' ? '芒聵聙茂赂聫' : '冒聼聦聶';
  localStorage.setItem('sc-theme', t);
  currentTheme = t;
}
function cycleTheme() { applyTheme(currentTheme === 'dark' ? 'light' : 'dark'); }
applyTheme(currentTheme);

var currentUser = null;
var myStudent = null;
var assignments = [];
var myFiles = [];
var selectedUploadFile = null;
var showCompleted = false;

document.addEventListener('DOMContentLoaded', async function() {
  currentUser = DB.requireAuth(['student']);
  if (!currentUser) return;

  document.getElementById('topbarTitle').textContent = currentUser.display_name + '矛聺聵 矛聢聵铆聳聣铆聫聣锚掳聙';

  try {
    myStudent = await DB.getStudentByUserId(currentUser.id);
    if (!myStudent) {
      showError('铆聲聶矛聝聺 矛聽聲毛鲁麓毛楼录 矛掳戮矛聺聞 矛聢聵 矛聴聠矛聤碌毛聥聢毛聥陇. 锚麓聙毛娄卢矛聻聬矛聴聬锚虏聦 毛卢赂矛聺聵铆聲聵矛聞赂矛職聰.');
      return;
    }

    var [asgns, files] = await Promise.all([
      DB.getStudentAssignments(myStudent.id),
      DB.getStudentFiles(myStudent.id)
    ]);
    assignments = asgns || [];
    myFiles = files || [];

    // 铆聦聦矛聺录 矛聴聟毛隆聹毛聯聹 毛陋篓毛聥卢 矛聢聵铆聳聣铆聫聣锚掳聙 毛陋漏毛隆聺 矛卤聞矛職掳锚赂掳 (矛聶聞毛拢聦毛聬聹 铆聲颅毛陋漏 矛聽聹矛聶赂)
    var sel = document.getElementById('upload_assignment_id');
    assignments.filter(function(a) { return a.stage !== '矛聶聞毛拢聦'; }).forEach(function(a) {
      var opt = document.createElement('option');
      opt.value = a.id;
      opt.textContent = '[' + a.subject + '] ' + a.title;
      sel.appendChild(opt);
    });

    renderPage();
  } catch(e) {
    showError('毛聧掳矛聺麓铆聞掳 毛隆聹毛聯聹 矛聥陇铆聦篓: ' + e.message);
  }
});

function renderPage() {
  var today = new Date(); today.setHours(0,0,0,0);
  var active = assignments.filter(function(a) { return a.stage !== '矛聶聞毛拢聦'; });
  var completed = assignments.filter(function(a) { return a.stage === '矛聶聞毛拢聦'; });

  // 锚赂麓锚赂聣 矛聲聦毛娄录
  var urgentAsgns = active.filter(function(a) {
    var dl = a.internal_deadline || a.school_deadline;
    if (!dl) return false;
    var diff = Math.ceil((new Date(dl) - today) / 86400000);
    return diff >= 0 && diff <= 3;
  });

  var html = '';

  // 铆聶聵矛聵聛 铆聴陇毛聧聰
  var greetings = ['矛聲聢毛聟聲铆聲聵矛聞赂矛職聰!', '矛聵陇毛聤聵毛聫聞 铆聶聰矛聺麓铆聦聟!', '锚戮赂矛陇聙铆聻聢 铆聲麓毛麓聬矛職聰!'];
  var greeting = greetings[new Date().getDay() % greetings.length];
  html += `
    <div class="welcome-header">
      <div class="welcome-greeting">${greeting}</div>
      <div class="welcome-name">${myStudent.name} 铆聲聶矛聝聺</div>
      <div class="welcome-sub">${myStudent.school||''} ${myStudent.grade ? myStudent.grade + '铆聲聶毛聟聞' : ''}</div>
      <div class="welcome-stats">
        <div class="welcome-stat">
          <div class="welcome-stat-val">${active.length}</div>
          <div class="welcome-stat-lbl">矛搂聞铆聳聣矛陇聭</div>
        </div>
        <div class="welcome-stat">
          <div class="welcome-stat-val">${urgentAsgns.length}</div>
          <div class="welcome-stat-lbl">锚赂麓锚赂聣 (D-3)</div>
        </div>
        <div class="welcome-stat">
          <div class="welcome-stat-val">${completed.length}</div>
          <div class="welcome-stat-lbl">矛聶聞毛拢聦</div>
        </div>
      </div>
    </div>
  `;

  // 锚赂麓锚赂聣 矛聲聦毛娄录 毛掳掳毛聞聢
  if (urgentAsgns.length > 0) {
    html += `
      <div class="notice-banner warn">
        <span class="notice-icon">芒職聽茂赂聫</span>
        <div class="notice-text">
          <strong>毛搂聢锚掳聬矛聺麓 矛聻聞毛掳聲铆聲聹 矛聢聵铆聳聣铆聫聣锚掳聙锚掳聙 ${urgentAsgns.length}锚卤麓 矛聻聢矛聤碌毛聥聢毛聥陇!</strong><br>
          ${urgentAsgns.map(function(a) {
            var dl = a.internal_deadline || a.school_deadline;
            var diff = Math.ceil((new Date(dl) - today) / 86400000);
            return a.subject + ' ' + a.title + ' (' + (diff === 0 ? 'D-Day' : 'D-' + diff) + ')';
          }).join(' 脗路 ')}
        </div>
      </div>
    `;
  }

  // 矛搂聞铆聳聣 矛陇聭 矛聢聵铆聳聣铆聫聣锚掳聙
  html += `<div class="section">`;
  html += `<div class="section-header">
    <div class="section-title"><span>冒聼聯聥</span> 矛搂聞铆聳聣 矛陇聭 <span class="section-count">${active.length}</span></div>
  </div>`;

  if (active.length === 0) {
    html += `<div class="empty-state"><div class="empty-icon">芒聹篓</div><div class="empty-text">铆聵聞矛聻卢 矛搂聞铆聳聣 矛陇聭矛聺赂 矛聢聵铆聳聣铆聫聣锚掳聙锚掳聙 矛聴聠矛聤碌毛聥聢毛聥陇.</div></div>`;
  } else {
    html += `<div class="asgn-list">`;
    active.sort(function(a,b) {
      var da = new Date(a.internal_deadline || a.school_deadline || '2099-12-31');
      var db2 = new Date(b.internal_deadline || b.school_deadline || '2099-12-31');
      return da - db2;
    }).forEach(function(a) {
      html += renderAssignmentCard(a, today);
    });
    html += `</div>`;
  }
  html += `</div>`;

  // 矛聶聞毛拢聦毛聬聹 矛聢聵铆聳聣铆聫聣锚掳聙 (矛聽聭锚赂掳/铆聨录矛鹿聵锚赂掳)
  if (completed.length > 0) {
    html += `
      <div class="section">
        <div class="completed-toggle ${showCompleted ? 'open' : ''}" onclick="toggleCompleted()">
          <span class="toggle-arrow">芒聳露</span>
          矛聶聞毛拢聦毛聬聹 矛聢聵铆聳聣铆聫聣锚掳聙 <span class="section-count">${completed.length}</span>
        </div>
        <div id="completedList" style="${showCompleted ? '' : 'display:none'}">
          <div class="asgn-list">
            ${completed.map(function(a) { return renderAssignmentCard(a, today); }).join('')}
          </div>
        </div>
      </div>
    `;
  }

  // 毛聜麓 矛聻聬毛拢聦 毛鲁麓锚麓聙铆聲篓
  html += `
    <div class="section">
      <div class="section-header">
        <div class="section-title"><span>冒聼聯聛</span> 毛聜麓 矛聻聬毛拢聦 毛鲁麓锚麓聙铆聲篓 <span class="section-count">${myFiles.length}</span></div>
        <button class="btn-sm" onclick="openModal('uploadFileModal')">+ 矛聴聟毛隆聹毛聯聹</button>
      </div>
      <div class="upload-section">
        <div class="file-list" id="myFileList">
          ${renderFileList()}
        </div>
      </div>
    </div>
  `;

  document.getElementById('pageContent').innerHTML = html;
  document.getElementById('loadingWrap').style.display = 'none';
  document.getElementById('pageContent').style.display = 'block';
}

function renderAssignmentCard(a, today) {
  var dl = a.internal_deadline || a.school_deadline;
  var dday = DB.getDDay(dl);
  var ddayClass = DB.getDDayClass(dl);
  var stage = DB.STAGE_LABELS[a.stage] || {};
  var stageIdx = DB.STAGES.indexOf(a.stage);
  var progressPct = Math.round(((stageIdx + 1) / DB.STAGES.length) * 100);
  var isCompleted = a.stage === '矛聶聞毛拢聦';

  return `
    <div class="asgn-card ${isCompleted ? 'opacity-50' : ''}" onclick="window.location.href='assignment-detail.html?id=${a.id}'">
      <div class="asgn-card-top">
        <div class="asgn-card-icon">${stage.icon || '冒聼聯聥'}</div>
        <div class="asgn-card-info">
          <div class="asgn-card-subject">${a.subject}</div>
          <div class="asgn-card-title">${a.title}</div>
          <div class="asgn-card-meta">${a.type || ''} ${a.school_deadline ? '脗路 铆聲聶锚碌聬毛搂聢锚掳聬 ' + DB.formatDate(a.school_deadline) : ''}</div>
        </div>
        <div class="asgn-card-right">
          <span class="asgn-stage-badge" style="color:${stage.color||'var(--text)'};border-color:${stage.color||'var(--border)'}">${stage.icon||''} ${a.stage}</span>
          ${dl && !isCompleted ? `<span class="dday-badge ${ddayClass}">${dday}</span>` : ''}
          ${isCompleted && a.grade ? `<span class="grade-badge grade-${(a.grade||'').replace('毛聯卤锚赂聣','')}">${a.grade}</span>` : ''}
          ${isCompleted && a.score != null ? `<span class="dday-badge" style="background:rgba(16,185,129,0.12);color:#059669;border-color:#059669">${a.score}矛聽聬</span>` : ''}
        </div>
      </div>
      <div class="asgn-progress">
        <div class="progress-bar-wrap">
          <div class="progress-bar" style="width:${progressPct}%"></div>
        </div>
        <div class="progress-label">STEP ${stageIdx+1}/8</div>
      </div>
    </div>
  `;
}

function renderFileList() {
  if (myFiles.length === 0) {
    return `<div class="empty-state" style="padding:28px"><div class="empty-icon">冒聼聯聜</div><div class="empty-text">矛聴聟毛隆聹毛聯聹毛聬聹 矛聻聬毛拢聦锚掳聙 矛聴聠矛聤碌毛聥聢毛聥陇.</div></div>`;
  }
  return myFiles.map(function(f) {
    var ext = (f.file_name || '').split('.').pop().toLowerCase();
    var icon = getFileIcon(ext);
    return `
      <div class="file-item">
        <span class="file-icon">${icon}</span>
        <div class="file-info">
          <div class="file-name">${f.file_name || '铆聦聦矛聺录'}</div>
          <div class="file-meta">${f.file_type || ''} 脗路 ${DB.formatDate(f.uploaded_at || f.created_at)}</div>
        </div>
        <button class="btn-icon" onclick="downloadFile('${f.file_url}','${(f.file_name||'file').replace(/'/g,'')}')">芒卢聡</button>
      </div>
    `;
  }).join('');
}

function toggleCompleted() {
  showCompleted = !showCompleted;
  var toggle = document.querySelector('.completed-toggle');
  var list = document.getElementById('completedList');
  if (toggle) toggle.classList.toggle('open', showCompleted);
  if (list) list.style.display = showCompleted ? '' : 'none';
}

function onStudentFileSelected(e) {
  var f = e.target.files[0];
  if (!f) return;
  if (f.size > 10 * 1024 * 1024) { alert('铆聦聦矛聺录 铆聛卢锚赂掳毛聤聰 10MB 矛聺麓铆聲聵矛聴卢矛聲录 铆聲漏毛聥聢毛聥陇.'); e.target.value = ''; return; }
  selectedUploadFile = f;
  document.getElementById('uploadFileName').textContent = f.name + ' (' + formatFileSize(f.size) + ')';
}

async function submitStudentUpload() {
  if (!selectedUploadFile) { showAlert('uploadAlert', '铆聦聦矛聺录矛聺聞 矛聞聽铆聝聺铆聲聵矛聞赂矛職聰.'); return; }
  var assignmentId = document.getElementById('upload_assignment_id').value || null;
  var fileType = document.getElementById('upload_file_type').value || '锚赂掳铆聝聙';
  var btn = document.getElementById('uploadSubmitBtn');
  btn.disabled = true; btn.textContent = '矛聴聟毛隆聹毛聯聹 矛陇聭芒聙娄';
  try {
    var newFile = await DB.uploadFile(
      selectedUploadFile, myStudent.id, assignmentId, fileType, ''
    );
    // assignmentId 矛聜聽毛卢麓矛聶聙 锚麓聙锚鲁聞矛聴聠矛聺麓 铆聲颅矛聝聛 毛隆聹矛禄卢 毛掳掳矛聴麓矛聴聬 矛露聰锚掳聙 (毛陋漏毛隆聺 矛娄聣矛聥聹 锚掳卤矛聥聽)
    myFiles.push(newFile);
    selectedUploadFile = null;
    document.getElementById('uploadFileName').textContent = '铆聦聦矛聺录矛聺聞 矛聞聽铆聝聺铆聲聵矛聞赂矛職聰 (矛碌聹毛聦聙 10MB)';
    document.getElementById('studentFileInput').value = '';
    closeModal('uploadFileModal');
    document.getElementById('myFileList').innerHTML = renderFileList();
    DB.toast('铆聦聦矛聺录矛聺麓 矛聴聟毛隆聹毛聯聹毛聬聵矛聴聢矛聤碌毛聥聢毛聥陇.');
  } catch(e) {
    showAlert('uploadAlert', '矛聴聟毛隆聹毛聯聹 矛聥陇铆聦篓: ' + e.message);
  } finally {
    btn.disabled = false; btn.textContent = '矛聴聟毛隆聹毛聯聹';
  }
}

function downloadFile(url, name) {
  var a = document.createElement('a');
  a.href = url; a.download = name; a.target = '_blank';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
}

function showError(msg) {
  document.getElementById('loadingWrap').innerHTML =
    `<div style="text-align:center;color:var(--negative);font-size:14px;padding:40px">芒職聽茂赂聫 ${msg}</div>`;
}
var _modalCount = 0;
function openModal(id) {
  document.getElementById(id).classList.add('open');
  _modalCount++;
  document.body.style.overflow = 'hidden';
}
function closeModal(id) {
  document.getElementById(id).classList.remove('open');
  _modalCount = Math.max(0, _modalCount - 1);
  if (_modalCount === 0) document.body.style.overflow = '';
}
function showAlert(id, msg) {
  var el = document.getElementById(id);
  el.textContent = msg; el.className = 'alert error show';
}
function formatFileSize(bytes) {
  if (!bytes) return '';
  if (bytes < 1024) return bytes + 'B';
  if (bytes < 1048576) return (bytes/1024).toFixed(1) + 'KB';
  return (bytes/1048576).toFixed(1) + 'MB';
}
function getFileIcon(ext) {
  var icons = { pdf:'冒聼聯聞', doc:'冒聼聯聺', docx:'冒聼聯聺', xls:'冒聼聯聤', xlsx:'冒聼聯聤', ppt:'冒聼聯聤', pptx:'冒聼聯聤',
    jpg:'冒聼聳录', jpeg:'冒聼聳录', png:'冒聼聳录', gif:'冒聼聳录', mp4:'冒聼聨卢', mov:'冒聼聨卢', zip:'冒聼聴聹', hwp:'冒聼聯聺', txt:'冒聼聯聞' };
  return icons[ext] || '冒聼聯聨';
}
document.querySelectorAll('.modal-overlay').forEach(function(ov) {
  ov.addEventListener('click', function(e) { if (e.target === ov) ov.classList.remove('open'); });
});
