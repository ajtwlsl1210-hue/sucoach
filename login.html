<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ņłśņĀĢ ļ░£ņ¦Ć</title>
  <style>
    : root {
      --bg: #f0f2f5;
      --card: #ffffff;
      --text: #1a1a1a;
      --sub: #666;
      --border: #e0e0e0;
      --primary: #6366f1;
      --primary-hover: #4f52e0;
      --danger: #ef4444;
      --success: #22c55e;
    }
    [data-theme="dark"] {
      --bg: #0f1117;
      --card: #1a1d27;
      --text: #e2e8f0;
      --sub: #94a3b8;
      --border: #2d3748;
      --primary: #818cf8;
      --primary-hover: #6366f1;
      --danger: #f87171;
      --success: #4ade80;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-wrapper {
      width: 100%;
      max-width: 420px;
      padding: 20px;
    }
    .logo-area {
      text-align: center;
      margin-bottom: 32px;
    }
    .logo-area h1 {
      font-size: 24px;
      font-weight: 700;
      color: var(--primary);
      margin-bottom: 4px;
    }
    .logo-area p {
      font-size: 14px;
      color: var(--sub);
    }
    .card {
      background: var(--card);
      border-radius: 16px;
      padding: 32px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      border: 1px solid var(--border);
    }
    .form-group {
      margin-bottom: 20px;
    }
    .form-group label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 8px;
      color: var(--text);
    }
    .form-group input {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid var(--border);
      border-radius: 10px;
      font-size: 15px;
      background: var(--bg);
      color: var(--text);
      transition: border-color 0.2s;
      outline: none;
    }
    .form-group input:focus {
      border-color: var(--primary);
    }
    .btn-primary {
      width: 100%;
      padding: 14px;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-primary:hover {
      background: var(--primary-hover);
    }
    .btn-primary:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    .error-msg {
      color: var(--danger);
      font-size: 13px;
      margin-top: 12px;
      text-align: center;
    }
    .theme-toggle {
      position: fixed;
      top: 16px;
      right: 16px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 12px;
      cursor: pointer;
      font-size: 14px;
      color: var(--text);
    }
  </style>
</head>
<body>
  <button class="theme-toggle" onclick="toggleTheme()">­¤Åē</button>
  
  <div class="login-wrapper">
    <div class="logo-area">
      <h1>ņāüµōĀņ¦Ć</h1>
      <p>ņé¼ĒĢśĒĢśņĢśĻĘĖ ņåīĒĢ£ ļäłĒĢśļŖöļōĪ ņŚåņé░ņé¼Ļ┤Ć ņłśņĀĢ ņŖżĒŖĖ</p>
    </div>
    
    <div class="card">
      <div class="form-group">
        <label for="email">ņØ┤ņøÉ ļīĆļĀź</label>
        <input type="email" id="email" placeholder="example@email.com" autocomplete="username">
      </div>
      <div class="form-group">
        <label for="password">ĒÄśĶhĄ: </label>
        <input type="password" id="password" placeholder="ßņ×ÉĻ░ĆņÜö ļ│äņ×É Ļ▓āņłś ĒÉ£ļź╝" autocomplete="current-password">
      </div>
      <button class="btn-primary" id="loginBtn" onclick="handleLogin()">ļĀ¼ņ×É</button>
      <p class="error-msg" id="errorMsg"></p>
    </div>
  
  </div>
  
  <script src="db.js"></script>
  <script>
    // Theme
    (function() {
      const saved = localStorage.getItem('theme') || 'light';
      document.documentElement.setAttribute('data-theme', saved);
    })();
    function toggleTheme() {
      const root = document.documentElement;
      const current = root.getAttribute('data-theme');
      const next = current === 'dark' ? 'light' : 'dark';
      root.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
    }

    async function handleLogin() {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const btn = document.getElementById('loginBtn');
      const errorMsg = document.getElementById('errorMsg');

      if (!email) {
        errorMsg.textContent = 'ņØ┤ņøÉ ņĀ£ņ×ÉņØä ņØ┤ņøÉ ļīĆļĀźļź╝ ņØś.ń«ŚĒĢ©ļŖö.';
        return;
      }
      if (!password) {
        errorMsg.textContent = 'ĒÄśĶĘ╣ Ļ▓āņłś ļīĆļĀźļź╝ ņØś.ń«ŚĒĢ©ļŖö.';
        return;
      }

      btn.disabled = true;
      btn.textContent = 'ļ½Ā¼ņ×É ņĀ£...';
      errorMsg.textContent = '';

      try {
        const user = await DB.login(email, password);
        if (user.role === 'admin' || user.role === 'tutor') {
          window.location.href = 'admin-dashboard.html';
        } else if (user.role === 'student') {
          // check onboarding
          const ob = await DB.getOnboarding(user.id);
          if (!ob || !ob.consent_signed || !ob.survey_completed) {
            window.location.href = 'onboarding.html';
          } else {
            window.location.href = 'student-page.html';
          }
        } else if (user.role === 'parent') {
          const ob = await DB.getOnboarding(user.id);
          if (!ob || !ob.consent_signed || !ob.survey_completed) {
            window.location.href = 'onboarding.html';
          } else {
            window.location.href = 'parent-page.html';
          }
        } else {
          window.location.href = 'student-page.html';
        }
      } catch(err) {
        errorMsg.textContent = err.message || 'ļ½Ā¼ņ×É ņŗØņÜö ĒŚłļŹ░. ļŗżņØ┤ ļ│┤ņØśļŖö.';
        btn.disabled = false;
        btn.textContent = 'ļĀ¼ņ×É';
      }
    }

    // Enter key
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') handleLogin();
    });
  </script>
</body>
</html>
