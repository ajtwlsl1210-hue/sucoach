<!DOCTYPE html>
<html lang="ko" class="theme-light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>강사 대시보드 — 수코치</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html.theme-dark {
      --bg:#0A0A0A; --surface:#141414; --surface-hover:#1C1C1C; --surface-2:#1C1C1C;
      --border:rgba(255,255,255,0.08); --text:#EDEDED; --text-secondary:#888; --text-muted:#555;
      --accent:#6366F1; --accent-hover:#818CF8; --accent-light:rgba(99,102,241,0.12);
      --positive:#10b981; --negative:#f43f5e; --warning:#f59e0b; --info:#3b82f6;
      --input-bg:#1C1C1C; --sidebar-width:220px;
    }
    html.theme-light {
      --bg:#F8FAFC; --surface:#FFFFFF; --surface-hover:#F1F5F9; --surface-2:#F8FAFC;
      --border:rgba(0,0,0,0.08); --text:#0F172A; --text-secondary:#64748B; --text-muted:#94A3B8;
      --accent:#4F46E5; --accent-hover:#4338CA; --accent-light:rgba(79,70,229,0.08);
      --positive:#059669; --negative:#DC2626; --warning:#D97706; --info:#2563EB;
      --input-bg:#F8FAFC; --sidebar-width:220px;
    }
    body {
      font-family:'Noto Sans KR',sans-serif; background:var(--bg); color:var(--text);
      min-height:100vh; -webkit-font-smoothing:antialiased; transition:background 0.3s,color 0.3s;
    }

    /* ── 레이아웃 ── */
    .layout { display:flex; min-height:100vh; }
    .sidebar {
      width:var(--sidebar-width); background:var(--surface); border-right:1px solid var(--border);
      display:flex; flex-direction:column; position:sticky; top:0; height:100vh; overflow-y:auto;
      flex-shrink:0;
    }
    .sidebar-logo {
      padding:20px 16px 16px; border-bottom:1px solid var(--border);
    }
    .logo-text { font-size:22px; font-weight:900; color:var(--accent); letter-spacing:-0.06em; }
    .logo-sub { font-size:11px; color:var(--text-muted); margin-top:2px; }
    .tutor-info {
      padding:14px 16px; border-bottom:1px solid var(--border);
      display:flex; align-items:center; gap:10px;
    }
    .tutor-avatar {
      width:36px; height:36px; border-radius:50%; background:var(--accent-light);
      color:var(--accent); display:flex; align-items:center; justify-content:center;
      font-size:14px; font-weight:800; flex-shrink:0;
    }
    .tutor-name { font-size:13px; font-weight:700; }
    .tutor-role { font-size:11px; color:var(--text-muted); }
    .sidebar-nav { flex:1; padding:8px; }
    .nav-item {
      display:flex; align-items:center; gap:10px; padding:10px 12px; border-radius:10px;
      cursor:pointer; font-size:13px; font-weight:600; color:var(--text-secondary);
      transition:all 0.2s; margin-bottom:2px; border:none; background:none;
      width:100%; text-align:left; font-family:inherit;
    }
    .nav-item:hover { background:var(--surface-hover); color:var(--text); }
    .nav-item.active { background:var(--accent-light); color:var(--accent); }
    .nav-icon { font-size:16px; width:20px; text-align:center; }
    .sidebar-footer {
      padding:12px 16px; border-top:1px solid var(--border);
    }
    /* ── 모바일 ── */
    .hamburger {
      display:none; width:32px; height:32px; border-radius:8px;
      border:1px solid var(--border); background:none; color:var(--text-secondary);
      font-size:16px; cursor:pointer; align-items:center; justify-content:center;
      flex-shrink:0;
    }
    .sidebar-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.45); z-index:98; }
    @media(max-width:768px) {
      .hamburger { display:flex; }
      .sidebar { position:fixed; top:0; left:0; height:100vh; z-index:99; transform:translateX(-100%); transition:transform 0.25s ease; }
      .sidebar.open { transform:translateX(0); }
      .sidebar-overlay.open { display:block; }
      .content { padding:16px; }
    }
    .btn-logout {
      width:100%; padding:9px; border-radius:8px; border:1px solid var(--border);
      background:none; color:var(--text-secondary); font-size:12px; font-weight:600;
      cursor:pointer; font-family:inherit; transition:all 0.2s; text-align:center;
    }
    .btn-logout:hover { background:var(--negative); color:white; border-color:var(--negative); }

    /* ── 메인 ── */
    .main { flex:1; min-width:0; overflow:hidden; }
    .topbar {
      height:56px; background:var(--surface); border-bottom:1px solid var(--border);
      display:flex; align-items:center; padding:0 24px; gap:12px; position:sticky; top:0; z-index:50;
    }
    .topbar-title { font-size:15px; font-weight:800; letter-spacing:-0.03em; flex:1; }
    .theme-btn {
      width:32px; height:32px; border-radius:8px; border:1px solid var(--border);
      background:none; color:var(--text-secondary); cursor:pointer; display:flex;
      align-items:center; justify-content:center; font-size:14px; transition:background 0.2s;
    }
    .theme-btn:hover { background:var(--surface-hover); }
    .content { padding:24px; max-width:1100px; }

    /* ── 통계 카드 ── */
    .stats-row { display:grid; grid-template-columns:repeat(auto-fit, minmax(160px, 1fr)); gap:16px; margin-bottom:28px; }
    .stat-card {
      background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:20px;
      display:flex; flex-direction:column; gap:6px; transition:transform 0.2s;
    }
    .stat-card:hover { transform:translateY(-2px); }
    .stat-icon { font-size:22px; }
    .stat-value { font-size:26px; font-weight:900; letter-spacing:-0.05em; color:var(--text); }
    .stat-label { font-size:12px; color:var(--text-muted); font-weight:600; }
    .stat-card.urgent .stat-value { color:var(--negative); }
    .stat-card.info-card .stat-value { color:var(--info); }

    /* ── 섹션 공통 ── */
    .section { margin-bottom:28px; }
    .section-header {
      display:flex; align-items:center; justify-content:space-between; margin-bottom:16px;
    }
    .section-title {
      font-size:15px; font-weight:800; letter-spacing:-0.03em;
      display:flex; align-items:center; gap:8px;
    }
    .section-count {
      background:var(--accent-light); color:var(--accent); border-radius:6px;
      padding:2px 8px; font-size:11px; font-weight:700;
    }

    /* ── 카드 테이블 ── */
    .data-card {
      background:var(--surface); border:1px solid var(--border);
      border-radius:16px; overflow:hidden;
    }
    .table-wrap { overflow-x:auto; }
    table { width:100%; border-collapse:collapse; }
    th {
      padding:11px 16px; text-align:left; font-size:11px; font-weight:700;
      color:var(--text-muted); background:var(--surface-2); border-bottom:1px solid var(--border);
      text-transform:uppercase; letter-spacing:0.04em; white-space:nowrap;
    }
    td { padding:13px 16px; font-size:13px; border-bottom:1px solid var(--border); }
    tr:last-child td { border-bottom:none; }
    tr:hover td { background:var(--surface-hover); }
    .clickable-row { cursor:pointer; }

    /* ── 배지 ── */
    .badge {
      display:inline-block; padding:3px 8px; border-radius:6px; font-size:11px; font-weight:700;
      white-space:nowrap;
    }
    .dday-urgent { background:rgba(220,38,38,0.1); color:var(--negative); }
    .dday-warning { background:rgba(217,119,6,0.1); color:var(--warning); }
    .dday-safe { background:rgba(5,150,105,0.1); color:var(--positive); }
    .dday-overdue { background:rgba(220,38,38,0.15); color:var(--negative); }
    .dday-none { background:var(--surface-2); color:var(--text-muted); }

    .stage-badge {
      padding:3px 9px; border-radius:6px; font-size:11px; font-weight:700;
      border:1px solid currentColor;
    }

    /* ── 학생 카드 그리드 ── */
    .student-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(240px, 1fr)); gap:14px; }
    .student-card {
      background:var(--surface); border:1px solid var(--border); border-radius:14px;
      padding:18px; cursor:pointer; transition:all 0.2s;
    }
    .student-card:hover { border-color:var(--accent); transform:translateY(-2px); box-shadow:0 4px 16px rgba(0,0,0,0.08); }
    .student-card-header { display:flex; align-items:center; gap:10px; margin-bottom:12px; }
    .student-avatar {
      width:38px; height:38px; border-radius:50%; background:var(--accent-light);
      color:var(--accent); display:flex; align-items:center; justify-content:center;
      font-size:14px; font-weight:800; flex-shrink:0;
    }
    .student-card-name { font-size:14px; font-weight:800; }
    .student-card-school { font-size:12px; color:var(--text-muted); margin-top:1px; }
    .student-card-stats { display:flex; gap:10px; }
    .student-stat { display:flex; flex-direction:column; gap:2px; flex:1; }
    .student-stat-val { font-size:16px; font-weight:800; color:var(--text); }
    .student-stat-lbl { font-size:10px; color:var(--text-muted); font-weight:600; }
    .student-stat-val.warn { color:var(--warning); }
    .student-stat-val.danger { color:var(--negative); }

    /* ── 오늘의 체크리스트 ── */
    .checklist { display:flex; flex-direction:column; gap:8px; }
    .check-item {
      display:flex; align-items:center; gap:12px; padding:14px 16px;
      background:var(--surface); border:1px solid var(--border); border-radius:12px;
      cursor:pointer; transition:all 0.2s;
    }
    .check-item:hover { border-color:var(--accent); }
    .check-item.done { opacity:0.5; }
    .check-item.done .check-text { text-decoration:line-through; }
    .check-circle {
      width:22px; height:22px; border-radius:50%; border:2px solid var(--border);
      display:flex; align-items:center; justify-content:center; flex-shrink:0;
      transition:all 0.2s;
    }
    .check-item.done .check-circle { background:var(--positive); border-color:var(--positive); }
    .check-circle::after { content:''; }
    .check-item.done .check-circle::after { content:'✓'; color:white; font-size:12px; font-weight:800; }
    .check-text { flex:1; font-size:13px; font-weight:600; }
    .check-student { font-size:12px; color:var(--text-muted); }
    .check-urgency {
      padding:3px 8px; border-radius:6px; font-size:11px; font-weight:700;
    }

    /* ── 빈 상태 ── */
    .empty-state {
      text-align:center; padding:40px; color:var(--text-muted);
    }
    .empty-state .empty-icon { font-size:36px; margin-bottom:10px; opacity:0.5; }
    .empty-state .empty-text { font-size:13px; }

    /* ── 로딩 ── */
    .loading-wrap {
      display:flex; align-items:center; justify-content:center; min-height:400px;
      flex-direction:column; gap:12px; color:var(--text-secondary);
    }
    .spinner-lg {
      width:36px; height:36px; border:3px solid var(--border);
      border-top-color:var(--accent); border-radius:50%; animation:spin 0.8s linear infinite;
    }
    @keyframes spin { to{transform:rotate(360deg)} }

    /* ── 비밀번호 변경 모달 ── */
    .modal-overlay {
      position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:200;
      display:none; align-items:center; justify-content:center; padding:24px;
    }
    .modal-overlay.open { display:flex; }
    .modal {
      background:var(--surface); border:1px solid var(--border);
      border-radius:20px; padding:32px; width:100%; max-width:420px;
      animation:fadeUp 0.3s ease-out both;
    }
    @keyframes fadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
    .modal-title { font-size:1.1rem; font-weight:800; margin-bottom:20px; }
    .form-group { margin-bottom:16px; }
    .form-group label { display:block; font-size:12px; font-weight:600; color:var(--text-secondary); margin-bottom:6px; }
    .form-group input {
      width:100%; padding:11px 13px; border-radius:9px; border:1.5px solid var(--border);
      background:var(--input-bg); color:var(--text); font-size:14px; font-family:inherit; outline:none;
      transition:border-color 0.2s;
    }
    .form-group input:focus { border-color:var(--accent); }
    .modal-actions { display:flex; gap:10px; margin-top:20px; }
    .btn-full {
      flex:1; padding:12px; border-radius:10px; font-size:14px; font-weight:700;
      cursor:pointer; font-family:inherit; border:none;
    }
    .btn-full.primary { background:var(--accent); color:white; }
    .btn-full.cancel { background:var(--surface-hover); color:var(--text); border:1px solid var(--border); }
    .alert { padding:10px 13px; border-radius:8px; font-size:13px; margin-bottom:14px; display:none; }
    .alert.error { background:rgba(220,38,38,0.08); color:var(--negative); border:1px solid rgba(220,38,38,0.2); }
    .alert.show { display:block; }
  </style>
</head>
<body>

<div class="layout">
  <div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>
  <!-- 사이드바 -->
  <nav class="sidebar" id="mainSidebar">
    <div class="sidebar-logo">
      <div class="logo-text">수코치</div>
      <div class="logo-sub">수행평가 전략관리</div>
    </div>
    <div class="tutor-info">
      <div class="tutor-avatar" id="tutorAvatar">?</div>
      <div>
        <div class="tutor-name" id="tutorName">로딩중…</div>
        <div class="tutor-role">강사</div>
      </div>
    </div>
    <div class="sidebar-nav">
      <button class="nav-item active" onclick="showSection('overview')">
        <span class="nav-icon">🏠</span> 전체 현황
      </button>
      <button class="nav-item" onclick="showSection('students')">
        <span class="nav-icon">👥</span> 내 담당 학생
      </button>
      <button class="nav-item" onclick="showSection('assignments')">
        <span class="nav-icon">📋</span> 수행평가 현황
      </button>
      <button class="nav-item" onclick="showSection('checklist')">
        <span class="nav-icon">✅</span> 오늘의 체크
      </button>
      <button class="nav-item" onclick="showSection('docs')">
        <span class="nav-icon">🗂</span> 내부자료
      </button>
      <button class="nav-item" onclick="openModal('pwModal')">
        <span class="nav-icon">🔑</span> 비밀번호 변경
      </button>
    </div>
    <div class="sidebar-footer">
      <button class="btn-logout" onclick="DB.logout()">로그아웃</button>
    </div>
  </nav>

  <!-- 메인 -->
  <div class="main">
    <div class="topbar">
      <button class="hamburger" onclick="toggleSidebar()">☰</button>
      <div class="topbar-title" id="pageTitle">전체 현황</div>
      <button class="theme-btn" id="themeBtn" onclick="cycleTheme()">🌙</button>
    </div>

    <div class="content" id="mainContent">
      <div class="loading-wrap">
        <div class="spinner-lg"></div>
        <div>불러오는 중…</div>
      </div>
    </div>
  </div>
</div>

<!-- 비밀번호 변경 모달 -->
<div class="modal-overlay" id="pwModal">
  <div class="modal">
    <div class="modal-title">🔑 비밀번호 변경</div>
    <div class="alert error" id="pwAlert"></div>
    <div class="form-group">
      <label>현재 비밀번호</label>
      <input type="password" id="inp_pw_current" placeholder="현재 비밀번호">
    </div>
    <div class="form-group">
      <label>새 비밀번호</label>
      <input type="password" id="inp_pw_new" placeholder="새 비밀번호 (6자 이상)">
    </div>
    <div class="form-group">
      <label>새 비밀번호 확인</label>
      <input type="password" id="inp_pw_confirm" placeholder="재입력">
    </div>
    <div class="modal-actions">
      <button class="btn-full cancel" onclick="closeModal('pwModal')">취소</button>
      <button class="btn-full primary" onclick="submitPwChange()">변경</button>
    </div>
  </div>
</div>

<script src="db.js"></script>
<script>
// ── 모바일 사이드바 ────────────────────────────────────────────────
function toggleSidebar() {
  var sb = document.getElementById('mainSidebar');
  var ov = document.getElementById('sidebarOverlay');
  sb.classList.toggle('open');
  ov.classList.toggle('open');
}
function closeSidebar() {
  document.getElementById('mainSidebar').classList.remove('open');
  document.getElementById('sidebarOverlay').classList.remove('open');
}

// ── 테마 ─────────────────────────────────────────────────────────
var savedTheme = localStorage.getItem('sc-theme');
var currentTheme = savedTheme || (window.matchMedia('(prefers-color-scheme:dark)').matches ? 'dark' : 'light');
function applyTheme(t) {
  document.documentElement.className = 'theme-' + t;
  var btn = document.getElementById('themeBtn');
  if (btn) btn.textContent = t === 'dark' ? '☀️' : '🌙';
  localStorage.setItem('sc-theme', t);
  currentTheme = t;
}
function cycleTheme() { applyTheme(currentTheme === 'dark' ? 'light' : 'dark'); }
applyTheme(currentTheme);

// ── 상태 ─────────────────────────────────────────────────────────
var currentUser = null;
var myStudents = [];
var myAssignments = [];
var allInternalDocs = [];
var activeSection = 'overview';

// ── 초기화 ───────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', async function() {
  currentUser = DB.requireAuth(['tutor']);
  if (!currentUser) return;

  document.getElementById('tutorAvatar').textContent = (currentUser.display_name || '?').charAt(0);
  document.getElementById('tutorName').textContent = currentUser.display_name || '강사';

  await loadData();
  renderOverview();
});

async function loadData() {
  var [students, assignments, docs] = await Promise.all([
    DB.getTutorStudents(currentUser.id),
    DB.getTutorAssignments(currentUser.id),
    DB.getInternalDocs()
  ]);
  myStudents = students || [];
  myAssignments = assignments || [];
  allInternalDocs = docs || [];
}

// ── 섹션 전환 ────────────────────────────────────────────────────
var pageTitles = {
  overview: '전체 현황',
  students: '내 담당 학생',
  assignments: '수행평가 현황',
  checklist: '오늘의 체크',
  docs: '내부자료'
};

function showSection(name) {
  activeSection = name;
  document.getElementById('pageTitle').textContent = pageTitles[name] || name;
  document.querySelectorAll('.nav-item').forEach(function(b) { b.classList.remove('active'); });
  var btn = document.querySelector(`.nav-item[onclick="showSection('${name}')"]`);
  if (btn) btn.classList.add('active');

  if (name === 'overview') renderOverview();
  else if (name === 'students') renderStudents();
  else if (name === 'assignments') renderAssignments();
  else if (name === 'checklist') renderChecklist();
  else if (name === 'docs') renderDocs();
  // 모바일에서 섹션 선택 시 사이드바 자동 닫기
  closeSidebar();
}

// ── 전체 현황 ────────────────────────────────────────────────────
function renderOverview() {
  var today = new Date(); today.setHours(0,0,0,0);
  var active = myAssignments.filter(function(a) { return a.stage !== '완료'; });
  var urgent = active.filter(function(a) {
    var dl = a.internal_deadline || a.school_deadline;
    if (!dl) return false;
    var diff = Math.ceil((new Date(dl) - today) / 86400000);
    return diff >= 0 && diff <= 5;
  });
  var completedThisMonth = myAssignments.filter(function(a) {
    if (a.stage !== '완료') return false;
    var d = new Date(a.updated_at);
    return d.getFullYear() === today.getFullYear() && d.getMonth() === today.getMonth();
  });

  // 긴급 수행평가 (D-3 이내)
  var critical = active.filter(function(a) {
    var dl = a.internal_deadline || a.school_deadline;
    if (!dl) return false;
    var diff = Math.ceil((new Date(dl) - today) / 86400000);
    return diff >= 0 && diff <= 3;
  }).sort(function(a,b) {
    var da = new Date(a.internal_deadline || a.school_deadline);
    var db2 = new Date(b.internal_deadline || b.school_deadline);
    return da - db2;
  });

  var html = `
    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-icon">👥</div>
        <div class="stat-value">${myStudents.length}</div>
        <div class="stat-label">담당 학생</div>
      </div>
      <div class="stat-card info-card">
        <div class="stat-icon">📋</div>
        <div class="stat-value">${active.length}</div>
        <div class="stat-label">진행 중</div>
      </div>
      <div class="stat-card urgent">
        <div class="stat-icon">🚨</div>
        <div class="stat-value">${urgent.length}</div>
        <div class="stat-label">D-5 이내 긴급</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">🎉</div>
        <div class="stat-value">${completedThisMonth.length}</div>
        <div class="stat-label">이번달 완료</div>
      </div>
    </div>

    <!-- 긴급 처리 필요 -->
    ${critical.length > 0 ? `
    <div class="section">
      <div class="section-header">
        <div class="section-title">
          <span>🚨</span> 긴급 처리 필요
          <span class="section-count">${critical.length}건</span>
        </div>
      </div>
      <div class="data-card">
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>학생</th>
                <th>수행평가</th>
                <th>과목</th>
                <th>단계</th>
                <th>내부 마감</th>
                <th>D-Day</th>
              </tr>
            </thead>
            <tbody>
              ${critical.map(function(a) {
                var dl = a.internal_deadline || a.school_deadline;
                var dday = DB.getDDay(dl);
                var ddayClass = DB.getDDayClass(dl);
                var stage = DB.STAGE_LABELS[a.stage] || {};
                var sn = a.student ? a.student.name : '—';
                return `
                  <tr class="clickable-row" onclick="goAssignment('${a.id}')">
                    <td><strong>${sn}</strong></td>
                    <td>${a.title}</td>
                    <td>${a.subject}</td>
                    <td><span class="stage-badge" style="color:${stage.color||'var(--text)'};border-color:${stage.color||'var(--border)'}">${stage.icon||''} ${a.stage}</span></td>
                    <td>${DB.formatDate(dl)}</td>
                    <td><span class="badge ${ddayClass}">${dday}</span></td>
                  </tr>
                `;
              }).join('')}
            </tbody>
          </table>
        </div>
      </div>
    </div>` : ''}

    <!-- 단계별 현황 요약 -->
    <div class="section">
      <div class="section-header">
        <div class="section-title"><span>📊</span> 단계별 현황</div>
      </div>
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px">
        ${DB.STAGES.map(function(stage) {
          var cnt = myAssignments.filter(function(a) { return a.stage === stage; }).length;
          var lbl = DB.STAGE_LABELS[stage] || {};
          return `
            <div style="background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px;text-align:center;cursor:pointer"
              onclick="showSection('assignments')">
              <div style="font-size:20px;margin-bottom:6px">${lbl.icon||'•'}</div>
              <div style="font-size:18px;font-weight:800;color:${lbl.color||'var(--text)'}">${cnt}</div>
              <div style="font-size:11px;color:var(--text-muted);margin-top:3px;font-weight:600">${stage}</div>
            </div>
          `;
        }).join('')}
      </div>
    </div>

    <!-- 최근 활동 (최근 수행평가) -->
    <div class="section">
      <div class="section-header">
        <div class="section-title"><span>🕐</span> 최근 업데이트</div>
        <button class="nav-item" style="padding:6px 12px;width:auto;margin:0" onclick="showSection('assignments')">전체 보기</button>
      </div>
      <div class="data-card">
        <div class="table-wrap">
          <table>
            <thead>
              <tr><th>학생</th><th>수행평가</th><th>단계</th><th>업데이트</th></tr>
            </thead>
            <tbody>
              ${myAssignments.slice().sort(function(a,b) { return new Date(b.updated_at||0)-new Date(a.updated_at||0); })
                .slice(0, 8).map(function(a) {
                  var stage = DB.STAGE_LABELS[a.stage] || {};
                  var sn = a.student ? a.student.name : '—';
                  return `<tr class="clickable-row" onclick="goAssignment('${a.id}')">
                    <td><strong>${sn}</strong></td>
                    <td>${a.title}</td>
                    <td><span class="stage-badge" style="color:${stage.color||'var(--text)'};border-color:${stage.color||'var(--border)'}">${stage.icon||''} ${a.stage}</span></td>
                    <td style="color:var(--text-muted);font-size:12px">${DB.formatDateTime(a.updated_at)}</td>
                  </tr>`;
                }).join('')}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  `;

  setContent(html);
}

// ── 담당 학생 ────────────────────────────────────────────────────
function renderStudents() {
  if (myStudents.length === 0) {
    setContent(`<div class="empty-state"><div class="empty-icon">👥</div><div class="empty-text">담당 학생이 없습니다.</div></div>`);
    return;
  }

  var today = new Date(); today.setHours(0,0,0,0);
  var html = `<div class="student-grid">`;
  myStudents.forEach(function(s) {
    var studentAsgns = myAssignments.filter(function(a) { return a.student_id === s.id; });
    var activeCount = studentAsgns.filter(function(a) { return a.stage !== '완료'; }).length;
    var urgentCount = studentAsgns.filter(function(a) {
      if (a.stage === '완료') return false;
      var dl = a.internal_deadline || a.school_deadline;
      if (!dl) return false;
      var diff = Math.ceil((new Date(dl) - today) / 86400000);
      return diff >= 0 && diff <= 5;
    }).length;
    var initials = (s.name || '?').charAt(0);
    var urgentClass = urgentCount > 0 ? 'danger' : activeCount > 0 ? 'warn' : '';

    html += `
      <div class="student-card" onclick="goStudent('${s.id}')">
        <div class="student-card-header">
          <div class="student-avatar">${initials}</div>
          <div>
            <div class="student-card-name">${s.name}</div>
            <div class="student-card-school">${s.school||''} ${s.grade?s.grade+'학년':''}</div>
          </div>
        </div>
        <div class="student-card-stats">
          <div class="student-stat">
            <div class="student-stat-val">${activeCount}</div>
            <div class="student-stat-lbl">진행중</div>
          </div>
          <div class="student-stat">
            <div class="student-stat-val ${urgentClass}">${urgentCount}</div>
            <div class="student-stat-lbl">긴급</div>
          </div>
          <div class="student-stat">
            <div class="student-stat-val">${studentAsgns.length}</div>
            <div class="student-stat-lbl">전체</div>
          </div>
        </div>
        ${s.student_type ? `<div style="margin-top:10px"><span style="font-size:11px;padding:2px 8px;background:var(--accent-light);color:var(--accent);border-radius:5px;font-weight:700">${s.student_type}</span></div>` : ''}
      </div>
    `;
  });
  html += `</div>`;
  setContent(html);
}

// ── 수행평가 현황 ────────────────────────────────────────────────
function renderAssignments() {
  var today = new Date(); today.setHours(0,0,0,0);

  // 필터 상태 (단순 전체 표시, 필터는 stage)
  var activeOnly = myAssignments.filter(function(a) { return a.stage !== '완료'; });
  var completed = myAssignments.filter(function(a) { return a.stage === '완료'; });

  function renderTable(list, title, icon) {
    if (list.length === 0) return '';
    return `
      <div class="section">
        <div class="section-header">
          <div class="section-title"><span>${icon}</span> ${title} <span class="section-count">${list.length}</span></div>
        </div>
        <div class="data-card">
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>학생</th><th>수행평가</th><th>과목</th><th>유형</th>
                  <th>단계</th><th>내부마감</th><th>D-Day</th>
                </tr>
              </thead>
              <tbody>
                ${list.sort(function(a,b) {
                  var da = new Date(a.internal_deadline || a.school_deadline || '2099-12-31');
                  var db2 = new Date(b.internal_deadline || b.school_deadline || '2099-12-31');
                  return da - db2;
                }).map(function(a) {
                  var dl = a.internal_deadline || a.school_deadline;
                  var dday = DB.getDDay(dl);
                  var ddayClass = DB.getDDayClass(dl);
                  var stage = DB.STAGE_LABELS[a.stage] || {};
                  var sn = a.student ? a.student.name : '—';
                  return `<tr class="clickable-row" onclick="goAssignment('${a.id}')">
                    <td><strong>${sn}</strong></td>
                    <td style="max-width:200px">${a.title}</td>
                    <td>${a.subject}</td>
                    <td style="color:var(--text-muted)">${a.type||'—'}</td>
                    <td><span class="stage-badge" style="color:${stage.color||'var(--text)'};border-color:${stage.color||'var(--border)'}">${stage.icon||''} ${a.stage}</span></td>
                    <td style="font-size:12px">${DB.formatDate(dl)}</td>
                    <td>${dl ? `<span class="badge ${ddayClass}">${dday}</span>` : '—'}</td>
                  </tr>`;
                }).join('')}
              </tbody>
            </table>
          </div>
        </div>
      </div>
    `;
  }

  var html = renderTable(activeOnly, '진행 중', '🔄') + renderTable(completed, '완료', '🎉');
  if (!html) {
    html = `<div class="empty-state"><div class="empty-icon">📋</div><div class="empty-text">수행평가가 없습니다.</div></div>`;
  }
  setContent(html);
}

// ── 오늘의 체크리스트 ────────────────────────────────────────────
function renderChecklist() {
  var today = new Date(); today.setHours(0,0,0,0);

  // 진행 중인 수행평가에서 각 단계별 해야 할 일 생성
  var tasks = [];
  myAssignments.forEach(function(a) {
    if (a.stage === '완료') return;
    var dl = a.internal_deadline || a.school_deadline;
    var diff = dl ? Math.ceil((new Date(dl) - today) / 86400000) : null;
    var sn = a.student ? a.student.name : '학생';
    var ddayClass = DB.getDDayClass(dl);
    var dday = DB.getDDay(dl);

    // 단계별 액션 아이템
    var actionMap = {
      '접수': `[${sn}] 루브릭 분석 및 코칭가이드 작성`,
      '분석완료': `[${sn}] 면담 일정 잡기`,
      '면담완료': `[${sn}] 초안 업로드 독려`,
      '초안대기': `[${sn}] 학생 초안 제출 확인`,
      '피드백완료': `[${sn}] 수정 지도 완료 후 단계 변경`,
      '수정중': `[${sn}] 수정본 확인 및 피드백`,
      '최종확인': `[${sn}] 최종 구두 확인 진행`,
    };
    var action = actionMap[a.stage];
    if (!action) return;

    // D-5 이내만 표시 (또는 전체)
    tasks.push({
      id: a.id,
      text: action,
      subject: a.subject + ' — ' + a.title,
      urgency: ddayClass,
      dday: dday || '',
      diff: diff,
      done: false
    });
  });

  // 긴급도 순 정렬 (diff 오름차순)
  tasks.sort(function(a, b) {
    if (a.diff === null && b.diff === null) return 0;
    if (a.diff === null) return 1;
    if (b.diff === null) return -1;
    return a.diff - b.diff;
  });

  if (tasks.length === 0) {
    setContent(`<div class="empty-state"><div class="empty-icon">✅</div><div class="empty-text">오늘 처리할 항목이 없습니다. 수고하셨습니다!</div></div>`);
    return;
  }

  var html = `
    <div style="margin-bottom:16px;font-size:13px;color:var(--text-muted)">
      총 ${tasks.length}개 항목 — 클릭하면 수행평가 상세로 이동합니다.
    </div>
    <div class="checklist" id="checklistContainer">
  `;
  tasks.forEach(function(t, i) {
    html += `
      <div class="check-item" id="task-${i}" onclick="goAssignment('${t.id}')">
        <div class="check-circle"></div>
        <div style="flex:1">
          <div class="check-text">${t.text}</div>
          <div class="check-student">${t.subject}</div>
        </div>
        ${t.dday ? `<span class="badge ${t.urgency}">${t.dday}</span>` : ''}
      </div>
    `;
  });
  html += `</div>`;
  setContent(html);
}

// ── 내부자료 (읽기 전용) ──────────────────────────────────────────
function renderDocs() {
  if (allInternalDocs.length === 0) {
    setContent(`
      <div class="empty-state">
        <div class="empty-icon">🗂</div>
        <div class="empty-text">등록된 내부자료가 없습니다.<br>관리자가 자료를 등록하면 여기에 표시됩니다.</div>
      </div>
    `);
    return;
  }

  var catColors = {
    '운영 매뉴얼': '#4F46E5', '루브릭 자료': '#0891B2', '코칭 가이드': '#059669',
    '참고 문서': '#D97706', '기타': '#64748B'
  };

  var rows = allInternalDocs.map(function(d) {
    var category = '-', desc = d.note || '';
    try {
      var p = JSON.parse(d.note || '{}');
      category = p.category || '-';
      desc     = p.desc     || '';
    } catch(e) {}
    var color = catColors[category] || '#64748B';
    return `
      <tr>
        <td><strong style="font-size:13px">${d.file_name || '-'}</strong></td>
        <td><span style="font-size:11px;padding:2px 8px;border-radius:5px;font-weight:700;background:${color}20;color:${color}">${category}</span></td>
        <td style="max-width:220px;font-size:12px;color:var(--text-secondary)">${desc}</td>
        <td style="font-size:12px;color:var(--text-muted)">${DB.formatDate(d.uploaded_at)}</td>
        <td>
          ${d.file_url
            ? `<a href="${d.file_url}" target="_blank" style="color:var(--accent);font-size:12px;font-weight:700;text-decoration:none">열기 ↗</a>`
            : `<span style="color:var(--text-muted);font-size:12px">링크 없음</span>`}
        </td>
      </tr>
    `;
  }).join('');

  var html = `
    <div class="section">
      <div class="section-header">
        <div class="section-title"><span>🗂</span> 내부자료 <span class="section-count">${allInternalDocs.length}건</span></div>
        <button class="nav-item" style="padding:6px 12px;width:auto;margin:0;font-size:12px" onclick="refreshDocs()">새로고침</button>
      </div>
      <div style="font-size:12px;color:var(--text-muted);margin-bottom:14px">관리자가 등록한 운영 매뉴얼, 루브릭 자료 등을 확인할 수 있습니다.</div>
      <div class="data-card">
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>자료명</th>
                <th>분류</th>
                <th>설명</th>
                <th>등록일</th>
                <th>열기</th>
              </tr>
            </thead>
            <tbody>${rows}</tbody>
          </table>
        </div>
      </div>
    </div>
  `;
  setContent(html);
}

async function refreshDocs() {
  try {
    allInternalDocs = await DB.getInternalDocs();
    renderDocs();
  } catch(e) {
    alert('새로고침 실패: ' + e.message);
  }
}

// ── 비밀번호 변경 ────────────────────────────────────────────────
async function submitPwChange() {
  var cur = document.getElementById('inp_pw_current').value;
  var nw = document.getElementById('inp_pw_new').value;
  var cf = document.getElementById('inp_pw_confirm').value;
  if (!cur || !nw || !cf) { showAlert('pwAlert', '모든 항목을 입력하세요.'); return; }
  if (nw.length < 6) { showAlert('pwAlert', '새 비밀번호는 6자 이상이어야 합니다.'); return; }
  if (nw !== cf) { showAlert('pwAlert', '새 비밀번호가 일치하지 않습니다.'); return; }
  try {
    await DB.changePassword(nw, cur);
    closeModal('pwModal');
    DB.toast('비밀번호가 변경되었습니다.');
  } catch(e) {
    showAlert('pwAlert', e.message);
  }
}

// ── 유틸 ─────────────────────────────────────────────────────────
function setContent(html) {
  document.getElementById('mainContent').innerHTML = html;
}
var _modalCount = 0;
function openModal(id) {
  document.getElementById(id).classList.add('open');
  _modalCount++;
  document.body.style.overflow = 'hidden';
}
function closeModal(id) {
  document.getElementById(id).classList.remove('open');
  _modalCount = Math.max(0, _modalCount - 1);
  if (_modalCount === 0) document.body.style.overflow = '';
}
function showAlert(id, msg) {
  var el = document.getElementById(id);
  el.textContent = msg; el.className = 'alert error show';
}
function goStudent(id) { window.location.href = 'student-detail.html?id=' + id; }
function goAssignment(id) { window.location.href = 'assignment-detail.html?id=' + id; }

document.querySelectorAll('.modal-overlay').forEach(function(ov) {
  ov.addEventListener('click', function(e) { if (e.target === ov) ov.classList.remove('open'); });
});
</script>
